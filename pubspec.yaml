name: u2b_loop_app
description: "YouTube & Local Video AB Loop Player"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  media_kit: ^1.1.11
  media_kit_video: ^1.1.11
  media_kit_libs_android_video: ^1.1.6
  youtube_explode_dart: ^2.3.5
  file_picker: ^8.1.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon-512.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/icon-512.png"

flutter:
  uses-material-design: true
