name: u2b_loop_app
description: "YouTube & Local Video AB Loop Player"
publish_to: 'none'
version: 1.39.23

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  media_kit: ^1.1.11
  media_kit_video: ^1.1.11
  media_kit_libs_android_video: ^1.1.6
  media_kit_libs_ios_video: ^1.1.4
  youtube_explode_dart: ^2.3.5
  file_picker: ^8.1.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  video_thumbnail: ^0.5.6
  package_info_plus: ^9.0.0
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon-512.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/icon-512.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
